name: "CodeQL Vulnerability Scan"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
    types: [ opened, synchronize, reopened ]
  schedule:
    # Run security scans on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'

jobs:
  analyze:
    name: Analyze TypeScript Code
    runs-on: ubuntu-latest
    permissions:
      # required for all workflows - upload analysis results
      security-events: write
      # required to fetch internal or private CodeQL packs
      packages: read
      # required for checkout
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]
        # CodeQL supports: 'actions', 'c-cpp', 'csharp', 'go', 'java-kotlin', 'javascript-typescript', 'python', 'ruby', 'rust', 'swift'
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        # Use CodeQL's default query suites for security scanning
        # For custom security queries, add: queries: security-extended

    - name: Autobuild for TypeScript
      uses: github/codeql-action/autobuild@v4

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{ matrix.language }}"
        # SARIF is generated automatically and uploaded to GitHub Security tab
        upload: true

    - name: Upload CodeQL SARIF Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: codeql-sarif-${{ matrix.language }}-${{ github.run_id }}
        path: ../results/
        retention-days: 30
        if-no-files-found: warn
        compression-level: 9
